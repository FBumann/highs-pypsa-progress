name: benchmark
on:
  push:
    branches:
    - main
  schedule:
  - cron: "0 5 1 * *"
  workflow_dispatch:
permissions:
  contents: write
jobs:
  build-and-deploy:
    concurrency: ci-${{ github.ref }}
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        enable-cache: true
    - name: Run workflow
      run: uv run snakemake -j1
    - name: Deploy
      uses: JamesIves/github-pages-deploy-action@v4
      with:
        folder: web
    - name: Archive monthly results as a release
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        tag="results-$(date -u +%Y-%m)"
        title="Benchmark results $(date -u +%Y-%m)"
        notes="HiGHS benchmark for all PyPI versions, generated $(date -u +%Y-%m-%dT%H:%MZ) on $(uname -srm)."
        gh release create "$tag" web/results.csv web/index.html \
          --title "$title" --notes "$notes" --latest \
        || gh release upload "$tag" web/results.csv web/index.html --clobber
